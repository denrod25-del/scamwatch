name: Bug report
description: Something isn't working as expected
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. **Do not include personal information or real scam-victim data.**
        For security vulnerabilities, use our [Security Policy](../../SECURITY.md) instead.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to…
        2. Click…
        3. See…
    validations:
      required: true
  - type: input
    id: prd-ref
    attributes:
      label: Related PRD requirement (optional)
      placeholder: e.g. FR-5.1.3
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        [
          Frontend,
          Search,
          Report flow,
          Moderation,
          AI/Intelligence,
          Backend/API,
          Accessibility,
          Other,
        ]
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: Browser, OS, device, screen reader (if a11y)
