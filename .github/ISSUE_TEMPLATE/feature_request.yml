name: Feature request
description: Propose a change or new capability
labels: [enhancement, triage]
body:
  - type: markdown
    attributes:
      value: |
        Every feature should help prevent real-world harm and respect our [product principles](../../docs/prd/README.md).
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem does this solve? Who is affected (persona)?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: input
    id: prd-ref
    attributes:
      label: Related PRD volume/requirement (optional)
      placeholder: e.g. Vol 5 — Functional Requirements
  - type: textarea
    id: principles
    attributes:
      label: Principle check
      description: How does this respect privacy, avoid exaggeration, and route to official verification?
